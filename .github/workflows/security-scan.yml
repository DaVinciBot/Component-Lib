name: Security Scan

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]
  schedule:
    - cron: '20 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  security:
    uses: DaVinciBot/shared-workflows/.github/workflows/security-scan.yml@v5.0.0
